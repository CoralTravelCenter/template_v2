<style>
    .summer__banner {
        height: 300px;
        width: 100%;
        border-radius: 12px;
        background: linear-gradient(199deg, #542DC6 -80.36%, #7155CC -40.29%, #894CAB 2.98%, #A13781 46.25%, #DE4059 86.31%);
        padding-right: 40px;
        display: flex;

        @media screen and (max-width: 1042px) {
            flex-direction: column;
            height: 100%;
            padding: 24px 24px 0;
        }
    }

    .summer__banner img {
        @media screen and (max-width: 1042px) {
            order: 2;
            margin-top: 10px;
        }
    }

    .summer__info {
        display: flex;
        flex-direction: column;
        gap: 8px;
        justify-content: center;

        @media screen and (max-width: 1042px) {
            order: 1;
        }
    }

    .summer__info .title-3, .summer__info .text {
        @media screen and (max-width: 1042px) {
            text-align: center;
        }
    }


    .black-block {
        padding: 32px;
        background-color: rgba(36, 36, 44, 1);
        border-radius: 20px;

        .title-2 {
            color: white;
        }

        .slider__info {
            background-color: #3A3A41;

            @media screen and (max-width: 767px) {
                min-height: auto;
            }
        }

        .slider__footer {
            @media screen and (max-width: 767px) {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        .title-4 {
            color: white;
        }

        .title-5 {
            color: white;
        }

        .text {
            color: white;
        }

        .coral-button {
            background-color: rgba(22, 104, 220, 1);
        }

        .slider__slide {
            flex: 1;
        }
    }

    .black-block__wrapper {
        display: flex;
        gap: 24px;

        @media screen and (max-width: 1023px) {
            flex-direction: column;
        }
    }

    .black-block__cash {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .black-block__tooltip {
        display: flex;
    }
</style>
<style>
    .slider {
        margin-top: 32px;
    }

    .slider__slide.swiper-slide {
        display: flex;
        flex-direction: column;
        height: auto;
        border-radius: 20px;
        background-color: white;
    }

    .slider__info {
        padding-block: 16px;
        padding-inline: 24px;
        border-radius: 0 0 20px 20px;
        flex: 1;
        background-color: white;
        display: flex;
        flex-direction: column;

        @media screen and (max-width: 767px) {
            min-height: 300px;
        }
    }

    .slider__img {
        border-radius: 20px 20px 0 0;
        height: 164px;
        object-fit: cover;
        object-position: center;
        display: flex;
    }

    .slider__title {
        font-size: 20px;
        line-height: 28px;
        font-weight: 600;
        margin-bottom: 8px;
    }

    .slider__prev {
        left: 10px;
    }

    .slider__next {
        right: 10px;
    }

    .swiper-button-lock.slider__prev,
    .swiper-button-lock.slider__next {
        display: none;
    }

    .slider__prev,
    .slider__next {
        position: absolute;
        width: 48px;
        height: 48px;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 50%;
        background-color: #FFFFFF;
        box-shadow: 0 10px 20px 0 rgba(0, 0, 0, 0.10);
        top: 51%;
        z-index: 1;
        cursor: pointer;
        user-select: none;

        @media screen and (max-width: 1042px) {
            top: 54%;
        }
    }

    .slider__box {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .slider__box + .slider__box {
        margin-top: 8px;
    }

    .slider__icon {
        width: 24px;
        height: 24px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .slider__footer {
        display: flex;
        align-items: center;
        margin-top: 16px;
        gap: 16px;

        @media screen and (max-width: 1279px) {
            flex-direction: column;
            align-items: flex-start;
        }

        @media screen and (max-width: 767px) {
            flex-direction: row;
            align-items: center;
        }

        @media screen and (max-width: 400px) {
            flex-direction: column;
            align-items: flex-start;
        }
    }

    .slider__price {
        font-size: 20px;
        line-height: 28px;
        font-weight: 600;

        @media screen and (max-width: 767px) {
            font-size: 16px;
            line-height: 24px;
        }
    }

    @media screen and (max-width: 767px) {
        .slider__prev,
        .slider__next {
            display: none;
        }
    }
</style>
