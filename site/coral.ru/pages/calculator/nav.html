<body>
<style>
    section.anchors--fixed > article .wrapper {
        padding-top: 10px;
        padding-bottom: 10px
    }

    .anchors {
        background-color: #fff;
        border-radius: 16px;
        flex-wrap: wrap;
        gap: 8px;
        padding: 8px;
        display: flex;
        box-shadow: 0 10px 20px rgba(0, 0, 0, .1)
    }

    .anchors--fixed {
        z-index: 1000;
        background-color: rgba(0, 0, 0, .3);
        width: 100%;
        position: fixed;
        top: 0;
        left: 0
    }

    @media screen and (max-width: 992px) {
        .anchors--fixed {
            top: 57px
        }
    }

    .anchors-placeholder {
        width: 100%;
        height: 0;
        display: block
    }

    a.anchors__link {
        text-align: center;
        border-radius: 8px;
        flex: 1;
        justify-content: center;
        align-items: center;
        min-width: 120px;
        height: 40px;
        display: flex;
        color: inherit !important;
        text-decoration: none !important
    }

    a.anchors__link:hover {
        color: #fff !important;
        background-color: #0092d0 !important
    }
</style>
<section class="coral js-anchor">
    <article>
        <div class="wrapper">
            <div class="anchors">
                <a class="anchors__link" href="#anchor-1" onclick="ym(96674199, 'reachGoal', 'promo_landing_navigation', { name_stock: { april_calculator: { name_block: 'Калькулятор' } } });">
                    Калькулятор
                </a>
                <a class="anchors__link" href="#anchor-2" onclick="ym(96674199, 'reachGoal', 'promo_landing_navigation', { name_stock: { april_calculator: { name_block: 'Промокод на скидку' } } });">
                    Промокод на скидку
                </a>
                <a class="anchors__link" href="#anchor-3" onclick="ym(96674199, 'reachGoal', 'promo_landing_navigation', { name_stock: { april_calculator: { name_block: 'Мы рекомендуем' } } });">
                    Мы рекомендуем
                </a>
                <a class="anchors__link" href="#anchor-4" onclick="ym(96674199, 'reachGoal', 'promo_landing_navigation', { name_stock: { april_calculator: { name_block: 'Менеджеры на связи' } } });">
                    Менеджеры на связи
                </a>
            </div>
        </div>
    </article>
</section>
<script>
    async function hostReactAppReady(
        selector = "#__next > div",
        timeout = 500,
    ) {
        return new Promise((resolve) => {
            const waiter = () => {
                const host_el = document.querySelector(selector);
                if (host_el?.getBoundingClientRect().height) {
                    resolve();
                } else {
                    setTimeout(waiter, timeout);
                }
            };
            waiter();
        });
    }

    hostReactAppReady().then(() => {
        const anchors = document.querySelector('.js-anchor');

        if (anchors) {
            const anchorsOffsetTop = anchors.getBoundingClientRect().top + window.scrollY;

            const placeholder = document.createElement('div');
            placeholder.className = 'anchors-placeholder';
            placeholder.style.display = 'none';

            anchors.parentNode.insertBefore(placeholder, anchors);

            function hotelsNav() {
                const fixedNav = document.querySelector('.el-affix--fixed');
                return !!(fixedNav && fixedNav.querySelector('.controls'));
            }


            function onScroll() {
                const scrollY = window.scrollY;

                if (hotelsNav()) {
                    if (anchors.classList.contains('anchors--fixed')) {
                        anchors.classList.remove('anchors--fixed');
                        placeholder.style.display = 'none';
                    }
                    return;
                }

                if (scrollY >= anchorsOffsetTop) {
                    if (!anchors.classList.contains('anchors--fixed')) {
                        anchors.classList.add('anchors--fixed');
                        placeholder.style.display = '';
                        placeholder.style.height = `${anchors.offsetHeight + 60}px`;
                    }
                } else {
                    if (anchors.classList.contains('anchors--fixed')) {
                        anchors.classList.remove('anchors--fixed');
                        placeholder.style.display = 'none';
                    }
                }
            }

            window.addEventListener('scroll', onScroll);
            window.addEventListener('resize', () => {
                if (anchors.classList.contains('anchors--fixed')) {
                    placeholder.style.height = `${anchors.offsetHeight}px`;
                }
            });
        }

        const anchorLinks = document.querySelectorAll('a[href^="#"]');

        anchorLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                const hash = this.getAttribute('href');
                if (!hash || hash.length < 2) return;

                const target = document.querySelector(hash);
                if (!target) return;

                let offset = anchors.offsetHeight;

                if (anchors.classList.contains('anchors--fixed')) {
                    offset = anchors.offsetHeight;
                }

                const targetPos = target.getBoundingClientRect().top + window.scrollY - offset;

                e.preventDefault();

                window.scrollTo({
                    top: targetPos,
                    behavior: 'smooth'
                });
            });
        });
    });
</script>
</body>
