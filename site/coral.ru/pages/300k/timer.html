<body>

<link rel="stylesheet" href="/site/global/css/layout.scss"/>
<link rel="stylesheet" href="/site/coral.ru/pages/300k/css/timer.scss"/>
<section class="coral js-timer-block">
    <article>
        <div class="wrapper wrapper--timer">
            <div class="ny-timer">
                <div class="ny-timer__column">
                    <div>
                        <h3 class="title-2">
                            Купите тур и выиграйте 300 000 ₽
                        </h3>
                    </div>
                </div>
                <div class="ny-timer__wrapper">
                    <div class="ny-timer__block">
                        <div class="ny-timer__box">
                            <span class="ny-timer__number" id="days"></span>
                            <span class="ny-timer__text" id="text-days"></span>
                        </div>
                        <div class="ny-timer__box">
                            <span class="ny-timer__number" id="hours"></span>
                            <span class="ny-timer__text" id="text-hours"></span>
                        </div>
                        <div class="ny-timer__box">
                            <span class="ny-timer__number" id="minutes"></span>
                            <span class="ny-timer__text" id="text-minutes"></span>
                        </div>
                        <div class="ny-timer__box">
                            <span class="ny-timer__number" id="seconds"></span>
                            <span class="ny-timer__text" id="text-seconds"></span>
                        </div>
                    </div>
                </div>
                <div class="ny-timer__button">
                    <a class="ny-timer__link" href="https://www.coral.ru/poleznaya-informatsiya/offers/hot-offers/vyigraj-tur/">Узнать больше</a>
                </div>
            </div>
        </div>
    </article>
</section>
<script src="./js/timer.js"></script>
</body>
