<style>
    .advantages {
        border-radius: 20px;
        background-color: white;
        padding-block: 32px;
        padding-inline: 48px;

        @media screen and (max-width: 1024px) {
            padding-block: 16px;
            padding-inline: 24px;
        }

        @media screen and (max-width: 768px) {
            padding-block: 16px;
            padding-inline: 0;
        }
    }

    .advantages__wrapper {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        grid-auto-rows: auto;
        gap: 24px;

        @media screen and (max-width: 1280px) {
            grid-template-columns: repeat(3, 1fr);
        }

        @media screen and (max-width: 768px) {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    .advantages__item {
        display: flex;
        flex-direction: column;
        gap: 22px;
        align-items: center;
        flex: 1;
    }

    .advantages__item .text {
        text-align: center;
    }

    .advantages__icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 99px;
        height: 99px;
        border-radius: 50%;
        background-color: rgba(0, 146, 208, 1);
    }
</style>
