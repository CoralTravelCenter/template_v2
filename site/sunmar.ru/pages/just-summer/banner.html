<body>
<link rel="stylesheet" href="/site/global/css/layout.scss"/>
<style>.banner {
    background-image: url(https://b2ccdn.sunmar.ru/content/promo/just-summer/banner.webp);
    background-position: 50%;
    background-repeat: no-repeat;
    background-size: cover;
    border-radius: 20px;
    width: 100%;
    height: 520px;
    position: relative;
}

@media screen and (max-width: 1280px) {
    .banner {
        height: 420px;
        background-image: url(https://b2ccdn.sunmar.ru/content/promo/just-summer/banner_1024.webp);
    }
}

@media screen and (max-width: 1024px) {
    .banner {
        height: 380px;
        background-image: url(https://b2ccdn.sunmar.ru/content/promo/just-summer/banner_768.webp);
    }
}

@media screen and (max-width: 428px) {
    .banner {
        background-image: url(https://b2ccdn.sunmar.ru/content/promo/just-summer/banner_m.webp);
        height: 520px;
        border-radius: 0;
    }
}

.banner__content {
    flex-direction: column;
    justify-content: center;
    height: 100%;
    padding-left: 64px;
    padding-right: 64px;
    display: flex
}

.banner__label {
    -webkit-backdrop-filter: blur(1px);
    backdrop-filter: blur(1px);
    background-color: rgba(255, 255, 255, .5);
    border-radius: 16px;
    align-items: center;
    height: 32px;
    padding-left: 14px;
    padding-right: 14px;
    font-size: 12px;
    display: flex;
    position: absolute;
    bottom: 24px;
    right: 45px;
}

.banner__tooltip {
    display: none;
    position: absolute;
    top: -30px;
    right: 15px;
    width: 155px;
    background-color: white;
    padding-block: 4px;
    padding-inline: 8px;
    font-size: 10px;
    border-radius: 4px;
}

.banner__tooltip::before {
    content: '';
    position: absolute;
    width: 10px;
    height: 10px;
    background-color: #FFFFFF;
    right: 10px;
    bottom: -5px;
    transform: rotate(45deg);
    border-radius: 2px;
}

.banner__label:hover .banner__tooltip {
    display: block;
}

@media screen and (max-width: 768px) {
    .banner__content {
        padding-left: 32px;
        padding-right: 32px
    }
}

@media screen and (max-width: 428px) {
    .banner__content {
        justify-content: flex-start;
        padding: 24px
    }
}</style>
<section class="sunmar">
    <article>
        <div class="wrapper">
            <div class="banner">
                <div class="banner__content">
                    <h1 class="banner__title" style="visibility: hidden; opacity: 0;">
                        Просто акция. Просто лето
                    </h1>
                </div>
                <div class="banner__label">Реклама
                    <div class="banner__tooltip">Реклама. ООО "Центрбронь"</div>
                </div>
            </div>
        </div>
    </article>
</section>
</body>
