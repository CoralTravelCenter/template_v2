<body>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
    }


    .mb-24 {
        margin-bottom: 24px;
    }

    .mb-16 {
        margin-bottom: 16px;
    }

    .mb-8 {
        margin-bottom: 8px;
    }

    .mb-4 {
        margin-bottom: 4px;
    }

    .mt-16 {
        margin-top: 16px;
    }

    .mt-8 {
        margin-top: 8px;
    }

    .flex-center {
        display: flex;
        justify-content: center;
    }

    .text-center {
        text-align: center;
    }

    .font-bold {
        font-weight: 600;
    }

    .d-hidden {
        display: none;

        @media screen and (max-width: 768px) {
            display: block;
        }
    }

    .m-hidden {
        display: block;

        @media screen and (max-width: 768px) {
            display: none;
        }
    }

    h1, h2, h3, h4, h5, h6, p, a {
        margin: 0;
        padding: 0;
    }



    .text {
        font-size: 16px;
        line-height: 24px;
    }

    .text-s {
        font-size: 12px;
        line-height: 20px;
    }

    .color-white {
        color: #fff!important;
    }


    .sunmar {
        .banner__title {
            font-size: 56px!important;
            line-height: 60px!important;
            color: white;
            margin-bottom: 24px;
            font-weight: 600!important;

            @media screen and (max-width: 1280px) {
                font-size: 40px!important;
                line-height: 48px!important;
            }

            @media screen and (max-width: 768px) {
                font-size: 32px!important;
                line-height: 40px!important;
            }
        }

        .banner__subtitle {
            font-size: 16px;
            line-height: 20px;
            color: white;
        }

        .banner__button {
            display: flex;
            height: 48px;
            align-items: center;
            padding-inline: 32px;
            background: linear-gradient(245deg, #D8242A 15.84%, #E7317D 84.16%);
            color: white;
            font-size: 16px;
            line-height: 20px;
            border-radius: 48px;
            width: fit-content;
            margin-top: 24px;
            text-decoration: none;
            border: 1px solid transparent;

            &:hover {
                background: linear-gradient(90deg, #D8242A 15.84%, #E7317D 84.16%);
            }
        }

        .title-1 {

        }

        .title-2 {
            font-size: 40px!important;
            line-height: 44px!important;
            font-weight: 600!important;

            @media screen and (max-width: 768px) {
                font-size: 32px!important;
                line-height: 36px!important;
            }
        }

        .title-3 {
            font-size: 32px!important;
            line-height: 36px!important;
        }

        .title-4 {
            font-size: 28px;
            line-height: 32px;
        }

        .title-5 {
            font-size: 24px;
            line-height: 28px;
        }

        .slider__pagination.swiper-pagination {

            &.swiper-pagination-horizontal {
                bottom: 0;
            }

            .swiper-pagination-bullet {
                width: 10px;
                height: 10px;
                background-color: #afafaf;
                opacity: 1;

                &.swiper-pagination-bullet-active {
                    background-color: #0E2855;
                }
            }
        }

        .wrapper:has(.banner) {
            @media screen and (max-width: 767px) {
                padding-inline: 0;
            }
        }
    }

    a.coral-button {
        display: flex;
        padding-inline: 20px;
        color: #FFFFFF;
        font-size: 16px;
        height: 48px;
        align-items: center;
        border-radius: 48px;
        background-color: #0092D0;
        text-decoration: none;
        width: fit-content;

        &:hover {
            background-color: #077DAD;
        }

        &--white {
            background-color: transparent;
            border: 1px solid rgba(0, 0, 0, 0.15);
            color: inherit;

            &:hover {
                color: #077DAD;
                border: 1px solid #077DAD;
                background-color: transparent;
            }
        }
    }

    a.sunmar-button {
        display: flex;
        padding-inline: 32px;
        color: #FFFFFF;
        font-size: 16px;
        height: 48px;
        align-items: center;
        border-radius: 48px;
        background: linear-gradient(245deg, #D8242A 15.84%, #E7317D 84.16%);
        text-decoration: none;
        width: fit-content;

        &:hover {
            background: linear-gradient(90deg, #D8242A 15.84%, #E7317D 84.16%);
        }

        &--white {
            background: white;
            border: 1px solid #D8242A;
            color: inherit;

            &:hover {
                color: white;
            }
        }
    }

    .bg-white {
        background-color: #FFFFFF;
    }

    .bg-grey {
        background-color: #F5F5F8;
    }

    .slider.swiper {
        &:not(:has(.swiper-pagination-lock)) {
            padding-bottom: 24px;
        }
    }

    .layout-container-limit:has(section.coral),
    .layout-container-limit:has(section.sunamr) {
        max-width: 100% !important;
        width: 100% !important;
        padding: 0 !important;
    }

    section > article {
        max-width: 1528px;
        margin: auto;
    }

    section > article .wrapper {
        padding-inline: 80px;
        padding-block: 40px;
        position: relative;

        @media screen and (max-width: 768px) {
            padding-inline: 16px;
            padding-block: 30px;
        }
    }

    section.full-width > article {
        max-width: 100%;
    }

    section.full-width > article .wrapper {
        padding-inline: 0;
    }

    section:has(.banner) .wrapper {
        padding-bottom: 0;
    }

    section:has(.banner.banner--text) .wrapper {
        padding-bottom: 40px;
    }

    .ant-col:has(section.coral) > div,
    .ant-col:has(section.sunmar) > div {
        padding: 0;
    }

    .text + .text {
        margin-top: 8px;
    }
</style>
<style>

    .banner {
        background-image: url("https://b2ccdn.sunmar.ru/content/promo/new-year/banner_1440.webp");
        width: 100%;
        background-size: cover;
        border-radius: 20px;
        background-repeat: no-repeat;
        background-position: center;
        height: 500px;

        @media screen and (max-width: 1439px) {
            background-image: url("https://b2ccdn.sunmar.ru/content/promo/new-year/banner_1280.webp");
            height: 400px;
        }

        @media screen and (max-width: 1279px) {
            background-image: url("https://b2ccdn.sunmar.ru/content/promo/new-year/banner_1024.webp");
            height: 360px;
        }

        @media screen and (max-width: 1023px) {
            background-image: url("https://b2ccdn.sunmar.ru/content/promo/new-year/banner_768.webp");
            height: 320px;
        }

        @media screen and (max-width: 767px) {
            background-image: url("https://b2ccdn.sunmar.ru/content/promo/new-year/banner_m.webp");
            height: 556px;
            border-radius: 0;
        }
    }

    .banner__content {
        display: flex;
        height: 100%;
        flex-direction: column;
        justify-content: center;
        padding-inline: 64px;

        @media screen and (max-width: 767px) {
            padding: 24px;
            justify-content: flex-start;
        }
    }
</style>
<section class="sunmar">
    <article>
        <div class="wrapper">
            <div class="banner">
                <div class="banner__content">
                    <h1 class="banner__title">
                        От праздничной магии <br> к магии отдыха
                    </h1>
                    <p class="banner__subtitle">
                        Выбирайте путешествия до и после Нового года <br>
                        со скидкой до 15 000 ₽ на туры и отели
                    </p>
                    <a href="#anchor-6" class="banner__button">
                        Узнать больше
                    </a>
                </div>
            </div>
        </div>
    </article>
</section>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="./../../template/js/script.js"></script>
</body>
