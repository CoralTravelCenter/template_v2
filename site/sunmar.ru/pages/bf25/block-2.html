<body>
<style>
    .conditions__content {
        display: flex;
        gap: 32px;
        margin-bottom: 24px;

        @media screen and (max-width: 1023px) {
            flex-direction: column;
            gap: 0;
        }
    }

    .conditions__col {
        flex: 1;
    }

    .conditions__code {
        display: flex;
        gap: 16px;
        align-items: center;
        height: 76px;
        justify-content: center;
        border-radius: 12px;
        background-color: white;
        width: 100%;
        padding-inline: 16px;

        @media screen and (max-width: 1240px) {
            height: 68px;
            padding-inline: 8px;
        }
    }

    .conditions__code span {
        font-size: 40px;
        line-height: 52px;
        color: #E7317D;
        font-weight: bold;

        @media screen and (max-width: 1240px) {
            font-size: 28px;
        }
    }

    .conditions__info {
        padding-inline: 48px;
        padding-block: 36px;
        border-radius: 16px;
        background-color: #FEEEE7;
        background-image: url("https://b2ccdn.sunmar.ru/content/promo/just-summer/icon.webp");
        background-repeat: no-repeat;
        background-position: left bottom;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 28px;

        @media screen and (max-width: 1400px) {
            background-size: 172px;
            background-position: -50px bottom;
        }

        @media screen and (max-width: 1240px) {

            padding-inline: 32px;
            padding-block: 28px;
        }

        @media screen and (max-width: 1023px) {
            background-position: left bottom;
            background-size: auto;
            padding-inline: 24px;
            padding-block: 18px;
        }

        @media screen and (max-width: 768px) {
            background-image: none;
            align-items: center;
        }
    }

    .conditions__list li {
        margin-left: 16px;
    }

    .conditions__col--right {
        display: flex;
        flex-direction: column;
    }

    .conditions__panel {
        display: flex;
        gap: 16px;
        padding-inline: 24px;
        align-items: center;
        margin-bottom: 16px;

        @media screen and (max-width: 1023px) {
            flex: unset;
        }
    }

    .sunmar .conditions__info .title-5 {
        @media screen and (max-width: 515px) {
            font-size: 16px;
        }
    }

    .sunmar .conditions .text {
        @media screen and (max-width: 515px) {
            font-size: 14px;
        }
    }
</style>
<section class="sunmar sunmar--dark sunmar--dark-1">
    <article>
        <div class="wrapper">
            <h2 class="title-2 text-center mb-16">
                Условия акции
            </h2>
            <div class="conditions">
                <div class="conditions__content">
                    <div class="conditions__col conditions__col--left">
                        <div class="conditions__panel">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                 fill="none">
                                <path d="M5 13L9 17L19 7" stroke="url(#paint0_linear_4771_25760)" stroke-width="2"
                                      stroke-linecap="round" stroke-linejoin="round"></path>
                                <defs>
                                    <linearGradient id="paint0_linear_4771_25760" x1="19" y1="7" x2="9.54054"
                                                    y2="20.2432" gradientUnits="userSpaceOnUse">
                                        <stop stop-color="#E7317D"></stop>
                                        <stop offset="1" stop-color="#D8242A"></stop>
                                    </linearGradient>
                                </defs>
                            </svg>
                            <div class="conditions__text-block">
                                <p class="text">
                                    <strong>Даты бронирования:</strong>
                                    28.11.2025 - 01.12.2025
                                </p>
                            </div>
                        </div>
                        <div class="conditions__panel">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                 fill="none">
                                <path d="M5 13L9 17L19 7" stroke="url(#paint0_linear_4771_25760)" stroke-width="2"
                                      stroke-linecap="round" stroke-linejoin="round"></path>
                                <defs>
                                    <linearGradient id="paint0_linear_4771_25760" x1="19" y1="7" x2="9.54054"
                                                    y2="20.2432" gradientUnits="userSpaceOnUse">
                                        <stop stop-color="#E7317D"></stop>
                                        <stop offset="1" stop-color="#D8242A"></stop>
                                    </linearGradient>
                                </defs>
                            </svg>
                            <div class="conditions__text-block">
                                <p class="text">
                                    <strong>Даты путешествия:</strong>
                                    02.01.2026 - 30.11.2026
                                </p>
                            </div>
                        </div>
                        <div class="conditions__panel">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                 fill="none">
                                <path d="M5 13L9 17L19 7" stroke="url(#paint0_linear_4771_25760)" stroke-width="2"
                                      stroke-linecap="round" stroke-linejoin="round"></path>
                                <defs>
                                    <linearGradient id="paint0_linear_4771_25760" x1="19" y1="7" x2="9.54054"
                                                    y2="20.2432" gradientUnits="userSpaceOnUse">
                                        <stop stop-color="#E7317D"></stop>
                                        <stop offset="1" stop-color="#D8242A"></stop>
                                    </linearGradient>
                                </defs>
                            </svg>
                            <div class="conditions__text-block">
                                <p class="text">
                                    <strong>
                                        Направления:
                                    </strong>
                                    Турция, Египет, ОАЭ, Таиланд, Вьетнам, Индия. </p>
                            </div>
                        </div>
                    </div>
                    <div class="conditions__col conditions__col--right">
                        <div class="conditions__panel">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                 fill="none">
                                <path d="M5 13L9 17L19 7" stroke="url(#paint0_linear_4771_25760)" stroke-width="2"
                                      stroke-linecap="round" stroke-linejoin="round"></path>
                                <defs>
                                    <linearGradient id="paint0_linear_4771_25760" x1="19" y1="7" x2="9.54054"
                                                    y2="20.2432" gradientUnits="userSpaceOnUse">
                                        <stop stop-color="#E7317D"></stop>
                                        <stop offset="1" stop-color="#D8242A"></stop>
                                    </linearGradient>
                                </defs>
                            </svg>
                            <div class="conditions__text-block">
                                <p class="text">
                                    <strong>Акция распространяется на бронирования пакетных туров и отелей.</strong>
                                </p>
                            </div>
                        </div>
                        <div class="conditions__panel">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                 fill="none">
                                <path d="M5 13L9 17L19 7" stroke="url(#paint0_linear_4771_25760)" stroke-width="2"
                                      stroke-linecap="round" stroke-linejoin="round"></path>
                                <defs>
                                    <linearGradient id="paint0_linear_4771_25760" x1="19" y1="7" x2="9.54054"
                                                    y2="20.2432" gradientUnits="userSpaceOnUse">
                                        <stop stop-color="#E7317D"></stop>
                                        <stop offset="1" stop-color="#D8242A"></stop>
                                    </linearGradient>
                                </defs>
                            </svg>
                            <div class="conditions__text-block">
                                <p class="text">
                                    Выгода уже включена в стоимость тура и отеля.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </article>
</section>
</body>
