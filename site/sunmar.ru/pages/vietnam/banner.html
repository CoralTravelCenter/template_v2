<script>
    function getScript(scriptUrl, callback) {
        const script = document.createElement("script");
        script.async = true;
        script.src = scriptUrl.trim();
        script.onload = callback;
        document.body.appendChild(script);
    }

    function vimeoAutoPlay() {
        const vimeoBox = document.querySelector(".js-player");

        if (!vimeoBox) return;

        const getVideoIdByScreen = () => {
            const width = window.innerWidth;
            if (width <= 768) return 1121202393;
            if (width <= 1024) return 1121202422;
            if (width <= 1280) return 1121202246;
            if (width <= 1440) return 1121202293;
            return 1121202345;
        };

        vimeoBox.dataset.vimeoVid = getVideoIdByScreen();

        let players = {};
        const io_options = {
            root: null,
            rootMargin: "0px",
            threshold: 0.33,
        };

        function doio() {
            const io = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    const target = entry.target;
                    const vid = target.dataset.vimeoVid;

                    if (entry.isIntersecting) {
                        if (players[vid]) {
                            players[vid].play();
                        } else {
                            players[vid] = new Vimeo.Player(target, {
                                id: Number(vid),
                                background: 1,
                                playsinline: 1,
                                autopause: 0,
                                title: 0,
                                byline: 0,
                                portrait: 0,
                                autoplay: 1,
                                muted: 1,
                            });

                            players[vid].play();
                            players[vid].on("play", function () {
                                this.element.parentElement.classList.add("playback");
                            });
                        }
                    } else {
                        players[vid]?.pause();
                    }
                });
            }, io_options);

            io.observe(vimeoBox);
        }

        getScript("https://player.vimeo.com/api/player.js", doio);
    }

    async function hostReactAppReady(selector = "#__next > div", timeout = 500) {
        return new Promise((resolve) => {
            const waiter = () => {
                const host_el = document.querySelector(selector);
                if (host_el?.getBoundingClientRect().height) {
                    resolve();
                } else {
                    setTimeout(waiter, timeout);
                }
            };
            waiter();
        });
    }

    hostReactAppReady().then(() => {
        vimeoAutoPlay();

        document.querySelectorAll('[data-tabs]').forEach(tabsBlock => {
            const tabs = Array.from(tabsBlock.querySelectorAll('.tabs__tab'));
            const panes = tabsBlock.querySelectorAll('.tabs__pane');

            function switchToTab(index) {
                if (index < 0 || index >= tabs.length) return;

                const tab = tabs[index];
                const tabId = tab.getAttribute('data-tab');

                tabs.forEach(item => item.classList.remove('tabs__tab--active'));
                panes.forEach(pane => pane.classList.remove('tabs__pane--active'));

                tab.classList.add('tabs__tab--active');
                const activePane = tabsBlock.querySelector(`.tabs__pane[data-tab="${tabId}"]`);
                if (activePane) {
                    activePane.classList.add('tabs__pane--active');
                }
            }

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const index = tabs.indexOf(tab);
                    switchToTab(index);
                });
            });

            const nextBtn = tabsBlock.querySelector('.js-next-tab');
            const prevBtn = tabsBlock.querySelector('.js-prev-tab');

            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    const activeIndex = tabs.findIndex(tab => tab.classList.contains('tabs__tab--active'));
                    const nextIndex = (activeIndex + 1) % tabs.length;
                    switchToTab(nextIndex);
                });
            }

            if (prevBtn) {
                prevBtn.addEventListener('click', () => {
                    const activeIndex = tabs.findIndex(tab => tab.classList.contains('tabs__tab--active'));
                    const prevIndex = activeIndex === 0 ? tabs.length - 1 : activeIndex - 1;
                    switchToTab(prevIndex);
                });
            }
        });

        const sliderLooks = new Swiper(".js-slider-looks", {
            breakpoints: {
                1280: {
                    slidesPerView: 3,
                    spaceBetween: 32,
                },
                1024: {
                    slidesPerView: 3,
                    spaceBetween: 32,
                },
                768: {
                    slidesPerView: 2,
                    spaceBetween: 32,
                },
            },
            slidesPerView: 1,
            spaceBetween: 32,
            loop: true,
            pagination: {
                el: ".js-pagination-looks",
                clickable: true,
            },
        });

        const sliderLocation = new Swiper(".js-slider-location", {
            breakpoints: {
                1280: {
                    slidesPerView: 1,
                    spaceBetween: 32,
                },
                1024: {
                    slidesPerView: 1,
                    spaceBetween: 32,
                },
                768: {
                    slidesPerView: 1,
                    spaceBetween: 32,
                },
            },
            slidesPerView: 1,
            spaceBetween: 32,
            loop: true,
            pagination: {
                el: ".js-pagination-location",
                clickable: true,
            },
            navigation: {
                nextEl: ".js-next-location",
                prevEl: ".js-prev-location",
            },
        });

        function setMargin() {
            const sliderContent = document.querySelector(".js-slider-content");
            const sliderPins = document.querySelectorAll('.js-slider-pin');
            const sliderPagination = document.querySelector('.js-pagination-location');
            const gridWidth = 1530;

            let fullWidth = document.body.clientWidth;
            let calcMargin = (fullWidth - gridWidth) / 2;

            if (calcMargin > 0) {
                sliderContent.style.marginLeft = calcMargin + "px";

                sliderPins.forEach((pin) => {
                    pin.style.marginRight = calcMargin + "px";
                });

                sliderPagination.style.marginRight = calcMargin + "px";
            }
        }

        function setImg() {
            const images = document.querySelectorAll('.js-slider-img');
            const width = window.innerWidth;

            let suffix = '';

            if (width < 768) {
                suffix = '_m';
            } else if (width < 1024) {
                suffix = '_768';
            } else if (width < 1280) {
                suffix = '_1024';
            } else if (width < 1440) {
                suffix = '_1280';
            }

            images.forEach((img, index) => {
                const slideNumber = index + 1;
                const baseName = `https://b2ccdn.sunmar.ru/content/landing-pages/vietnam_gds_2025/slider_${slideNumber}`;
                const newSrc = suffix
                    ? `${baseName}${suffix}.webp`
                    : `${baseName}.webp`;

                if (img.src !== newSrc) {
                    img.src = newSrc;
                }
            });
        }

        setTimeout(() => {
            setMargin();
            setImg()
        }, 500);

        window.addEventListener('resize', () => {
            setMargin();
            setImg();
        });
    });
</script>
